services:
  - type: web
    name: acadease-ai-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: GROK_API_BASE
        value: https://api.x.ai/v1
      - key: GROK_MODEL
        value: grok-2-latest
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
      - key: UNIVERSITY_NAME
        value: Guru Nanak Dev University
      - key: APP_NAME
        value: AcadEase AI
